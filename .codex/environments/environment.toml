# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "PX4-Autopilot"

[setup]
script = '''
set -euo pipefail

cd "${CODEX_WORKTREE_PATH:-$PWD}"

git submodule sync --recursive
git submodule update --init --recursive --jobs=8

if [ ! -d .venv ]; then
  python3 -m venv .venv
fi

. .venv/bin/activate
pip install -U pip
pip install future
pip install -r Tools/setup/requirements.txt
'''

[cleanup]
script = '''
set -euo pipefail

ROOT="${CODEX_WORKTREE_PATH:-$PWD}"
cd "$ROOT"

# Find processes that mention this worktree path, plus processes with open files inside it.
PIDS="$(
  {
    pgrep -f "$ROOT" || true
    command -v lsof >/dev/null && lsof -t +D "$ROOT" 2>/dev/null || true
  } | sort -u | grep -v "^$$$" || true
)"

if [ -n "$PIDS" ]; then
  kill $PIDS 2>/dev/null || true
  sleep 2

  STILL_RUNNING=""
  for pid in $PIDS; do
    if kill -0 "$pid" 2>/dev/null; then
      STILL_RUNNING="$STILL_RUNNING $pid"
    fi
  done

  if [ -n "$STILL_RUNNING" ]; then
    kill -9 $STILL_RUNNING 2>/dev/null || true
  fi
fi

rm -rf /tmp/px4-* 2>/dev/null || true
'''

[[actions]]
name = "Run Default"
icon = "run"
command = '''
set -euo pipefail
cd "${CODEX_WORKTREE_PATH:-$PWD}"

[ -f .venv/bin/activate ] && . .venv/bin/activate

make px4_sitl gz_x500
'''

[[actions]]
name = "Run Tests"
icon = "test"
command = '''
set -euo pipefail
cd "${CODEX_WORKTREE_PATH:-$PWD}"

[ -f .venv/bin/activate ] && . .venv/bin/activate

make tests
'''

[[actions]]
name = "Check Format"
icon = "run"
command = '''
set -euo pipefail
cd "${CODEX_WORKTREE_PATH:-$PWD}"

make check_format
'''

[[actions]]
